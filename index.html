      <a href="#">À propos</a>
      <a href="#">Nos recettes</a>
      <a href="#">Contact</a>
    </nav>
    <span>© 2025 La Table</span>
  </footer>

  <div id="fond-detail" class="masque">
    <div class="fenetre">
      <button id="bouton-fermer-detail">X</button>
      <img id="image-detail" src="" alt="" />
      <div class="fenetre-contenu">
        <small id="detail-categorie"></small>
        <h2 id="detail-nom"></h2>
        <h3>Ingrédients</h3>
        <ul id="detail-ingredients"></ul>
        <h3>Instructions</h3>
        <p id="detail-instructions"></p>
      </div>
    </div>
  </div>

  <div id="fond-formulaire" class="masque">
    <div class="fenetre">
      <button id="bouton-fermer-formulaire">X</button>
      <div class="fenetre-contenu">
        <h2>Nouvelle recette</h2>

        <label>Nom *</label>
        <input type="text" id="champ-nom" placeholder="Ex : Gateau au chocolat" />
        <span class="message-erreur" id="erreur-nom"></span>

        <label>Catégorie *</label>
        <select id="champ-categorie">
          <option value="">-- Choisir --</option>
          <option value="Entrées">Entrées</option>
          <option value="Plats">Plats</option>
          <option value="Desserts">Desserts</option>
        </select>
        <span class="message-erreur" id="erreur-categorie"></span>

        <label>Ingrédients *</label>
        <input type="text" id="champ-ingredients" placeholder="Ex : Farine, sucre, oeufs" />
        <span class="message-erreur" id="erreur-ingredients"></span>

        <label>Instructions *</label>
        <textarea id="champ-instructions" rows="4"></textarea>
        <span class="message-erreur" id="erreur-instructions"></span>

        <div class="boutons-formulaire">
          <button id="bouton-annuler">Annuler</button>
          <button id="bouton-enregistrer">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <div id="notification"></div>
